<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="線香花火">
<meta name="theme-color" content="#04020a">
<title>線香花火品評会</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&display=swap');
:root { --gold:#d4a853; --gold2:#f0c870; --bg:#04020a; --text:#e8dcc8; --dim:#5a4a38; }
* { box-sizing:border-box; margin:0; padding:0; touch-action:manipulation; }
html,body { height:100%; overflow:hidden; }
body {
  background:var(--bg);
  font-family:'Noto Serif JP','Hiragino Mincho ProN',serif;
  color:var(--text);
  display:flex; align-items:center; justify-content:center;
  user-select:none;
  -webkit-user-select:none;
}
.screen {
  display:none; flex-direction:column; align-items:center;
  width:100%; height:100%; position:absolute; top:0; left:0;
}
.screen.active { display:flex; }

/* ── TITLE ── */
#scTitle {
  justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#1a0c30 0%,#04020a 65%);
  padding-top:    env(safe-area-inset-top,    0px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.title-spark {
  font-size:52px; margin-bottom:14px;
  filter:drop-shadow(0 0 22px #f0a020);
  animation:breathe 2.6s ease-in-out infinite;
}
@keyframes breathe {
  0%,100%{ filter:drop-shadow(0 0 18px #f0a020); }
  50%    { filter:drop-shadow(0 0 40px #ffd060); }
}
.title-main { font-size:22px; letter-spacing:10px; color:var(--gold2); margin-bottom:8px; font-weight:300; }
.title-sub  { font-size:9px;  letter-spacing:6px;  color:var(--dim);   margin-bottom:50px; }
.btn-start {
  padding:16px 52px;
  background:linear-gradient(135deg,#c89040,#6a3e0a);
  border:none; border-radius:12px;
  color:#fff8e8; font-size:14px; letter-spacing:8px;
  font-family:inherit; cursor:pointer;
  box-shadow:0 0 36px rgba(200,140,50,.45);
  transition:transform .15s;
}
.btn-start:active { transform:scale(.96); }

/* ── LOBBY ── */
#scLobby {
  justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#1a0c30 0%,#04020a 65%);
  gap:20px;
  padding: calc(36px + env(safe-area-inset-top,0px)) 24px calc(36px + env(safe-area-inset-bottom,0px));
}
.lobby-title { font-size:13px; letter-spacing:8px; color:var(--gold2); }
.lobby-sub   { font-size:9px;  letter-spacing:4px; color:var(--dim); margin-top:-12px; }
.count-grid  { display:grid; grid-template-columns:repeat(4,54px); gap:10px; }
.count-btn {
  width:54px; height:54px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(212,168,83,0.22);
  border-radius:12px;
  color:var(--text); font-size:18px; font-family:inherit; cursor:pointer;
  transition:background .15s, border-color .15s;
}
.count-btn.selected {
  background:rgba(212,168,83,0.18);
  border-color:rgba(212,168,83,0.80);
  color:var(--gold2);
}

/* ── PRE-ROUND ── */
#scPreRound {
  justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#1a0c30 0%,#04020a 65%);
  gap:16px;
  padding: calc(40px + env(safe-area-inset-top,0px)) 24px calc(40px + env(safe-area-inset-bottom,0px));
}
.pre-turn-num  { font-size:9px;  letter-spacing:7px; color:var(--dim); }
.pre-turn-name { font-size:28px; letter-spacing:6px; color:var(--gold2); font-weight:300; min-height:44px; text-align:center; }
.pre-name-label { font-size:9px; letter-spacing:4px; color:var(--dim); }
#preNameInput {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(212,168,83,0.28);
  border-radius:8px; padding:10px 16px;
  color:var(--text); font-size:14px; font-family:inherit; letter-spacing:3px;
  text-align:center; outline:none; width:200px;
}

/* ── GAME ── */
#scGame { justify-content:flex-start; padding:0; }
#gameCanvas { width:100%; height:100%; display:block; cursor:pointer; touch-action:none; }
.phase-label {
  position:absolute; top:calc(22px + env(safe-area-inset-top,0px)); left:50%; transform:translateX(-50%);
  font-size:11px; letter-spacing:6px; color:rgba(212,168,83,.5);
  pointer-events:none;
}
.timer-label {
  position:absolute; top:calc(22px + env(safe-area-inset-top,0px)); right:18px;
  font-size:10px; font-family:monospace; letter-spacing:2px;
  color:rgba(160,140,100,.35); pointer-events:none;
}
.player-label {
  position:absolute; top:calc(22px + env(safe-area-inset-top,0px)); left:18px;
  font-size:10px; letter-spacing:3px; color:rgba(212,168,83,.45);
  pointer-events:none; max-width:120px; overflow:hidden; white-space:nowrap;
}
.tap-hint {
  position:absolute; bottom:calc(68px + env(safe-area-inset-bottom,0px)); left:50%; transform:translateX(-50%);
  font-size:10px; letter-spacing:5px; color:rgba(160,140,110,.45);
  pointer-events:none; transition:opacity 1.2s; white-space:nowrap;
}
.meter-wrap {
  position:absolute; bottom:calc(28px + env(safe-area-inset-bottom,0px)); left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:5px;
  pointer-events:none;
}
.meter-label { font-size:9px; letter-spacing:5px; color:rgba(180,150,90,.5); }
.meter-bg    { width:min(200px,55vw); height:7px; background:rgba(255,255,255,.08); border-radius:4px; overflow:hidden; }
.meter-bar   { height:100%; border-radius:4px; transition:width .1s, background .4s; }

/* ── RESULT ── */
#scResult {
  justify-content:flex-start; gap:14px;
  padding: calc(20px + env(safe-area-inset-top,0px)) 18px calc(20px + env(safe-area-inset-bottom,0px));
  background:radial-gradient(ellipse at 50% 20%,#160c28 0%,#04020a 60%);
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.result-canvas-wrap {
  width:100%; max-width:400px; border-radius:16px; overflow:hidden;
  border:1px solid rgba(212,168,83,.13); background:#05020d; flex-shrink:0;
}
#resultCanvas { display:block; width:100%; height:180px; }
.judge-card {
  width:100%; max-width:400px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(212,168,83,.2);
  border-radius:16px; padding:20px 18px;
  display:flex; flex-direction:column; gap:14px; flex-shrink:0;
}
.judge-header { display:flex; align-items:center; gap:12px; }
.judge-avatar {
  width:42px; height:42px; border-radius:50%;
  background:linear-gradient(135deg,#3a2810,#8a5a20);
  border:1px solid rgba(212,168,83,.35);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0;
}
.judge-name  { font-size:10px; letter-spacing:3px; color:var(--dim); margin-bottom:2px; }
.judge-title { font-size:13px; letter-spacing:2px; color:rgba(212,168,83,.7); }
.score-row { display:flex; justify-content:center; align-items:center; gap:20px; }
.s-block   { text-align:center; }
.s-label   { font-size:9px;  letter-spacing:4px; color:var(--dim); margin-bottom:4px; }
.s-val     { font-size:28px; font-weight:300; }
.s-grade   { font-size:18px; letter-spacing:4px; }
.s-divider { width:1px; height:44px; background:rgba(255,255,255,.1); }
.rank-detail {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 14px; background:rgba(0,0,0,.2); border-radius:8px;
}
.rank-item       { text-align:center; }
.rank-item-label { font-size:9px;  letter-spacing:3px; color:var(--dim); margin-bottom:3px; }
.rank-item-val   { font-size:12px; letter-spacing:2px; }
.comment-box {
  border-left:3px solid var(--gold); padding:12px 16px;
  font-size:13px; line-height:2.1; letter-spacing:1px;
  color:#c0b49a; background:rgba(0,0,0,.2); border-radius:0 8px 8px 0;
}
.comment-loading { text-align:center; font-size:11px; letter-spacing:4px; color:var(--dim); padding:10px 0; }
.result-next-info {
  text-align:center; font-size:10px; letter-spacing:4px; color:var(--dim); padding:4px 0;
}
.btn-retry {
  width:100%; padding:13px;
  background:transparent; border:1px solid rgba(212,168,83,.3);
  border-radius:10px; color:var(--gold);
  font-size:12px; letter-spacing:6px; font-family:inherit; cursor:pointer;
  transition:background .2s;
}
.btn-retry:hover { background:rgba(212,168,83,.07); }
.btn-retry.btn-next {
  background:linear-gradient(135deg,#c89040,#6a3e0a);
  border-color:transparent; color:#fff8e8;
  box-shadow:0 0 22px rgba(200,140,50,.3);
}

/* ── RANKING ── */
#scRanking {
  justify-content:flex-start;
  background:radial-gradient(ellipse at 50% 20%,#160c28 0%,#04020a 60%);
  gap:14px;
  padding: calc(30px + env(safe-area-inset-top,0px)) 20px calc(30px + env(safe-area-inset-bottom,0px));
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.rank-screen-title { font-size:13px; letter-spacing:8px; color:var(--gold2); }
.rank-card   { width:100%; max-width:380px; display:flex; flex-direction:column; gap:8px; }
.rank-row {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(212,168,83,0.12);
  border-radius:10px;
}
.rank-row.winner { background:rgba(212,168,83,0.10); border-color:rgba(212,168,83,0.45); }
.rank-num   { font-size:22px; font-weight:300; color:var(--gold2); width:32px; text-align:center; flex-shrink:0; }
.rank-name  { flex:1; }
.rank-name-main  { font-size:13px; letter-spacing:2px; }
.rank-phase-sub  { font-size:9px;  letter-spacing:2px; color:var(--dim); margin-top:2px; }
.rank-time  { font-size:15px; letter-spacing:1px; font-family:monospace; color:var(--gold2); flex-shrink:0; }
.btn-again  {
  width:100%; max-width:380px; padding:13px;
  background:transparent; border:1px solid rgba(212,168,83,.3);
  border-radius:10px; color:var(--gold);
  font-size:12px; letter-spacing:6px; font-family:inherit; cursor:pointer;
  transition:background .2s;
}
.btn-again:hover { background:rgba(212,168,83,.07); }
.btn-title-link {
  font-size:10px; letter-spacing:4px; color:var(--dim); background:none; border:none;
  cursor:pointer; font-family:inherit; padding:4px;
}
.best-score-wrap {
  margin-top:20px; text-align:center;
}
.best-score-label { font-size:8px; letter-spacing:5px; color:var(--dim); margin-bottom:4px; }
.best-score-val   { font-size:12px; letter-spacing:3px; color:rgba(212,168,83,0.65); }
.lobby-mode-row   { display:flex; flex-direction:column; align-items:center; gap:6px; }

/* ── SAFE AREA: scLiveSetup ── */
#scLiveSetup {
  justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#1a0c30 0%,#04020a 65%);
  gap:16px;
  padding: calc(36px + env(safe-area-inset-top,0px)) 24px calc(36px + env(safe-area-inset-bottom,0px));
}

/* ── MOBILE COMPACT ── */
@media (max-height: 680px) {
  .title-spark  { font-size:36px !important; margin-bottom:8px !important; }
  .title-main   { font-size:18px; margin-bottom:4px; }
  .title-sub    { margin-bottom:24px; }
  #scLobby      { gap:12px !important; }
  #scPreRound   { gap:10px !important; }
  .pre-turn-name{ font-size:22px; }
  .btn-start    { padding:13px 40px; }
}
@media (max-width: 400px) {
  .count-grid   { grid-template-columns:repeat(4,48px); gap:8px; }
  .count-btn    { width:48px; height:48px; font-size:16px; }
  .judge-card   { padding:16px 14px; }
  .s-val        { font-size:22px; }
  .comment-box  { font-size:12px; }
}
</style>
</head>
<body>

<!-- TITLE -->
<div class="screen active" id="scTitle">
  <div class="title-spark">🎇</div>
  <div class="title-main">線香花火品評会</div>
  <div class="title-sub">SENKO HANABI COMPETITION</div>
  <button class="btn-start" onclick="goLobby()">点 火</button>
  <div class="best-score-wrap" id="bestScoreWrap" style="display:none">
    <div class="best-score-label">自 己 ベ ス ト</div>
    <div class="best-score-val" id="bestScoreVal">—</div>
  </div>
</div>

<!-- LOBBY: player count -->
<div class="screen" id="scLobby">
  <div class="title-spark" style="font-size:38px;margin-bottom:4px">🎇</div>
  <div class="lobby-title">対 戦 人 数</div>
  <div class="lobby-sub">PLAYERS</div>
  <div class="count-grid" id="countGrid"></div>
  <div class="lobby-mode-row" id="lobbyModeRow" style="display:none">
    <div class="lobby-sub" style="margin-bottom:6px">モードを選ぶ</div>
    <div style="display:flex;gap:12px">
      <button class="count-btn" style="width:80px;height:44px;font-size:11px;letter-spacing:2px" onclick="confirmLobby()">CPU 対 戦</button>
      <button class="count-btn selected" style="width:80px;height:44px;font-size:11px;letter-spacing:2px" onclick="selectLiveMode()">同 時 対 戦</button>
    </div>
  </div>
  <button class="btn-start" id="btnLobbyFire" onclick="confirmLobby()">点 火</button>
</div>

<!-- LIVE SETUP: simultaneous human player names -->
<div class="screen" id="scLiveSetup">
  <div class="title-spark" style="font-size:36px;margin-bottom:4px">🎇</div>
  <div class="lobby-title" style="font-size:11px;letter-spacing:7px">同 時 対 戦</div>
  <div class="lobby-sub">各自の名前を入力</div>
  <div id="liveNameInputs" style="display:flex;flex-direction:column;gap:8px;width:100%;max-width:280px"></div>
  <button class="btn-start" onclick="beginLiveGame()">点 火</button>
</div>

<!-- PRE-ROUND: whose turn -->
<div class="screen" id="scPreRound">
  <div class="title-spark" style="font-size:36px;margin-bottom:4px">🎇</div>
  <div class="pre-turn-num"  id="preTurnNum">第 1 番手</div>
  <div class="pre-turn-name" id="preTurnName">プレイヤー1</div>
  <div class="pre-name-label">名前を変更できます</div>
  <input type="text" id="preNameInput" placeholder="プレイヤー1" maxlength="8">
  <button class="btn-start" onclick="beginCurrentRound()">は じ め る</button>
</div>

<!-- GAME -->
<div class="screen" id="scGame">
  <canvas id="gameCanvas"></canvas>
  <div class="player-label" id="playerLabel"></div>
  <div class="phase-label"  id="phaseLabel">蕾</div>
  <div class="timer-label"  id="timerLabel">0.0s</div>
  <div class="tap-hint"     id="tapHint">タップして火種を支える</div>
  <div class="meter-wrap">
    <div class="meter-label">安 定 度</div>
    <div class="meter-bg"><div class="meter-bar" id="meterBar" style="width:100%;background:#b8d860;"></div></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="scResult">
  <div class="result-canvas-wrap">
    <canvas id="resultCanvas"></canvas>
  </div>
  <div class="judge-card">
    <div class="judge-header">
      <div class="judge-avatar">🕯️</div>
      <div>
        <div class="judge-name">首席審査員</div>
        <div class="judge-title" id="rPlayerName">線香花火品評会</div>
      </div>
    </div>
    <div class="score-row">
      <div class="s-block">
        <div class="s-label">評 価</div>
        <div class="s-val s-grade" id="rGrade">—</div>
      </div>
      <div class="s-divider"></div>
      <div class="s-block">
        <div class="s-label">点 数</div>
        <div class="s-val" id="rScore">—</div>
      </div>
      <div class="s-divider"></div>
      <div class="s-block">
        <div class="s-label">燃焼時間</div>
        <div class="s-val" id="rTime" style="font-size:20px">—</div>
      </div>
    </div>
    <div class="rank-detail">
      <div class="rank-item">
        <div class="rank-item-label">到達フェーズ</div>
        <div class="rank-item-val" id="rPhase">—</div>
      </div>
      <div class="rank-item">
        <div class="rank-item-label">最高安定度</div>
        <div class="rank-item-val" id="rStability">—</div>
      </div>
      <div class="rank-item">
        <div class="rank-item-label">タップ数</div>
        <div class="rank-item-val" id="rTaps">—</div>
      </div>
    </div>
    <div id="commentWrap">
      <div class="comment-loading" id="commentLoading">審 査 中 …</div>
      <div class="comment-box"    id="commentBox"    style="display:none"></div>
    </div>
    <div class="result-next-info" id="resultNextInfo"></div>
    <button class="btn-retry" id="btnRetryAction">も う 一 本</button>
  </div>
</div>

<!-- RANKING (multiplayer) -->
<div class="screen" id="scRanking">
  <div class="title-spark" style="font-size:36px;margin-bottom:4px">🎇</div>
  <div class="rank-screen-title">結 果 発 表</div>
  <div class="rank-card" id="rankCard"></div>
  <button class="btn-again" onclick="goLobby()">も う 一 局</button>
  <button class="btn-title-link" onclick="resetGame()">タイトルへ戻る</button>
</div>

<script>
(function () {
  "use strict";

  // ── mobile detection ───────────────────────────
  var IS_MOBILE = (function() {
    return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ||
           (('ontouchstart' in window) && window.innerWidth < 1024);
  })();
  var PM = IS_MOBILE ? 0.55 : 1.0;  // particle multiplier

  // ── constants ──────────────────────────────────
  var PHASE_NAMES   = ["蕾","牡丹","松葉","散り菊"];
  var STABILITY_MAX = 100;
  var DRAIN_BASE    = 3.5;
  var TAP_RESTORE   = 5;    // base tap is weak; ring timing is the real mechanic
  var TAP_COOLDOWN  = 500;  // slower spam cap

  var RING_MIN  = 8;
  var RING_MAX  = IS_MOBILE ? 52 : 68;
  var RING_PERF = RING_MIN + (IS_MOBILE ? 11 : 15);
  var RING_GOOD = RING_MIN + (IS_MOBILE ? 26 : 34);
  var RING_CPS  = [0.65, 1.05, 1.55, 0.50];

  var GRADE_TABLE = [
    { min:88, name:"皆伝",   color:"#ffd97a" },
    { min:72, name:"大輪",   color:"#ffb84a" },
    { min:55, name:"松葉",   color:"#f0e060" },
    { min:38, name:"柳",     color:"#90d890" },
    { min:0,  name:"散り菊", color:"#a890cc" },
  ];

  var PHASE_CFG = [
    { burst:2,  ivl:12, spd:0.7, life:0.45, sz:1.4, h0:25, h1:50, grav:0.018, trailMax:4,  branch:false, mode:'full'  },
    { burst:9,  ivl:5,  spd:2.4, life:0.90, sz:2.6, h0:22, h1:60, grav:0.012, trailMax:6,  branch:true,  mode:'full'  },
    { burst:22, ivl:2,  spd:3.6, life:1.40, sz:2.1, h0:14, h1:44, grav:0.002, trailMax:24, branch:false, mode:'full'  },
    { burst:10, ivl:4,  spd:1.9, life:0.68, sz:1.8, h0:8,  h1:35, grav:0.042, trailMax:7,  branch:false, mode:'lower' },
  ];

  // ── mutable state ──────────────────────────────
  var gc, gctx;
  var animId      = null;
  var gameState   = "idle";
  var startTime   = 0;
  var lastTS      = 0;
  var lastTap     = 0;
  var tapCount    = 0;
  var stability   = STABILITY_MAX;
  var maxStab     = STABILITY_MAX;
  var phaseIdx    = 0;
  var particles   = [];
  var emberWobble = 0;
  var frameN      = 0;
  var smokes      = [];
  var bgStars     = [];
  var prevPhase   = -1;
  var phaseAnim   = { t:0, name:'' };
  var hiBall      = null;
  var fallElapsed = 0;
  var ring        = { t:0, r:RING_MAX, hitFlash:0, hitGrade:'', gradeT:0 };
  var _wx = 0, _wy = 0;
  var _burnY = 0;         // ember Y rises as sparkler is consumed
  var _burnYOffset = 0;   // random per-round start height (±20 px)
  var tapConsecutive = 0; // consecutive non-ring taps (spam penalty)
  var timePressure   = 1.0;  // escalating drain mult; ramps after 20s elapsed
  var _drawXs        = [];   // animated render X per player: [human, cpu0, cpu1, ...]
  var _drawXTgts     = [];   // lerp target X
  var _pendingRecalc = false; // set when a CPU is eliminated → recalc column layout
  var _syncFlash     = null; // { t, cx1, cy1, cx2, cy2 } — 息が合った effect
  var _elimFlash     = 0;    // white flash intensity on elimination
  var bgFWs           = [];   // background fireworks
  var _bgFwTimer      = 3.5;  // seconds until next auto-launch
  var _ringHitStreak  = 0;    // consecutive ring hits — drives diminishing returns
  var _ringPerturbTmr = 7.0;  // timer until next random ring phase jump
  var _lastManStanding = false; // true when human is the only survivor in multiplayer
  var _lastManTimer    = 0;    // seconds elapsed since last man standing

  var CPU_COLORS = ["#88b8ff","#ff8888","#88ffaa","#ffcc88","#cc88ff","#ff88cc","#aaffee"];
  var CPU_HUES   = [200, 350, 120, 280, 28, 168, 315]; // blue,red,green,purple,orange,cyan,pink

  var CPU_PERSONALITIES = ['堅実','強気','慎重','律動','焦り屋','堅実','強気'];
  var PERSONALITY_CFG = {
    '堅実':  { threshold:0.78, restoreMult:1.00, ivlMult:1.00, jitter:0.80 },
    '強気':  { threshold:0.90, restoreMult:0.75, ivlMult:0.68, jitter:1.20 },

  // Ember rises ~0.8 px/s, capped at 55 px above center; yOff = per-player random start offset

  // ── column layout helpers ──────────────────────
  // Human is always at the center column so everyone "surrounds" the view.
  function getHumanColIdx() {
    if (!mpActive || mpTotalPlayers <= 1) return 0;
    return Math.floor((mpTotalPlayers - 1) / 2);
  }
  function getColCX(colIdx) {
    var colW = gc.width / mpTotalPlayers;
    return (colIdx + 0.5) * colW;
  }
  function getHumanCX() {
    if (!gc) return 0;
    if (!mpActive || mpTotalPlayers <= 1) return gc.width * 0.5;
    return getColCX(getHumanColIdx());
  }
  function getCpuCX(cpuIdx) {
    // CPU i is placed in the column just before/after the human column
    var h = getHumanColIdx();
    return getColCX(cpuIdx < h ? cpuIdx : cpuIdx + 1);
  }

  // ── animated column positions (lerp toward target on each elimination) ──
  function humanDrawX() {
    return (_drawXs.length > 0 && gc) ? _drawXs[0] : getHumanCX();
  }
  function cpuDrawX(i) {
    return (_drawXs.length > i + 1 && gc) ? _drawXs[i + 1] : getCpuCX(i);
  }
  function initDrawXs() {
    if (!gc) return;
    _drawXs    = [getHumanCX()];
    _drawXTgts = [getHumanCX()];
    for (var i = 0; i < cpuUnits.length; i++) {
      _drawXs.push(getCpuCX(i));
      _drawXTgts.push(getCpuCX(i));
    }
  }
  // Recalculate target X positions so alive players fill the canvas evenly.
  // humanAlive: false when human already eliminated (watching state).
  function recalcDrawXTgts(W, humanAlive) {
    var aliveCpu = [];
    for (var i = 0; i < cpuUnits.length; i++) {
      if (!cpuUnits[i].eliminated) aliveCpu.push(i);
    }
    var n = (humanAlive ? 1 : 0) + aliveCpu.length;
    if (n === 0) return;
    var cw = W / n;
    if (humanAlive) {
      // Human at center, CPUs split left/right
      var left  = aliveCpu.slice(0, Math.floor(aliveCpu.length / 2));
      var right = aliveCpu.slice(Math.floor(aliveCpu.length / 2));
      var order = left.concat([-1]).concat(right); // -1 = human slot
      for (var j = 0; j < order.length; j++) {
        var x = (j + 0.5) * cw;
        if (order[j] === -1) { _drawXTgts[0] = x; }
        else                  { _drawXTgts[order[j] + 1] = x; }
      }
    } else {
      for (var j = 0; j < aliveCpu.length; j++) {
        _drawXTgts[aliveCpu[j] + 1] = (j + 0.5) * cw;
      }
    }
  }
  function lerpDrawXs(dt) {
    var rate = Math.min(1, 2.5 * dt);
    for (var i = 0; i < _drawXs.length; i++) {
      if (_drawXTgts[i] !== undefined) {
        _drawXs[i] += (_drawXTgts[i] - _drawXs[i]) * rate;
      }
    }
  }

  // ── helpers ────────────────────────────────────

  function getPhaseIdx(e) {

  function radialGlow(ctx, x, y, r, c1, c2) {
    var g = ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,   c1);
    g.addColorStop(0.45,c2+"99");
    g.addColorStop(1,   c2+"00");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }

  // ── START ──────────────────────────────────────
  window.startGame = function() {
    showScreen("scGame");

    // In multi mode, names are drawn in each column on canvas
    document.getElementById("playerLabel").style.display = 'none';

    gc   = document.getElementById("gameCanvas");
    gctx = gc.getContext("2d");

    gc.addEventListener("click", onTap);

    stability   = STABILITY_MAX;
    maxStab     = STABILITY_MAX;
    phaseIdx    = 0;
    tapCount    = 0;

    smokes      = [];
    emberWobble = 0;

    _wx = 0; _wy = 0;

    phaseExtSum    = [0, 0, 0, 0];
    extFlash       = { t:0, text:'' };
    combo          = 0;
    comboMax       = 0;
    comboFlash     = { t:0 };
    peonyChance    = null;
    peonyCd        = 3.0;
    tapConsecutive = 0;
    _burnY         = 0;  // will be set after fitCanvas in first frame
    _burnYOffset   = (Math.random() - 0.5) * 44; // ±22 px random start height
    timePressure   = 1.0;
    _drawXs        = [];
    _drawXTgts     = [];
    _pendingRecalc = false;
    _syncFlash     = null;
    _elimFlash     = 0;

    _ringPerturbTmr  = 7.0;
    _lastManStanding = false;
    _lastManTimer    = 0;
    _lastManMult     = 1.0;
    _lastManShrink   = 1.0;
    _tapBlockedFlash = 0;
    _restorePopups   = [];

    startTime   = performance.now();
    lastTS      = startTime;

    initAudio();

    var hint = document.getElementById("tapHint");
    hint.style.opacity = "1";
    setTimeout(function(){ hint.style.opacity = "0"; }, 3200);

    cpuUnits = [];

      for (var ici = 0; ici < mpTotalPlayers - 1; ici++) {
        cpuUnits.push(createCpuUnit(
          CPU_NAMES[ici % CPU_NAMES.length],

  function fitCanvas() {
    if (!gc) return;
    gc.width  = gc.offsetWidth;
    gc.height = gc.offsetHeight;
  }

  // ── GAME LOOP ──────────────────────────────────
  function gameLoop(ts) {
    if (gameState !== "burning") return;

    var dt      = Math.min((ts - lastTS) / 1000, 0.05);
    lastTS      = ts;
    var elapsed = (ts - startTime) / 1000;
    frameN++;

    phaseIdx = getPhaseIdx(elapsed);

    if (phaseIdx !== prevPhase && prevPhase >= 0) {
      phaseAnim.t    = 1.6;
      phaseAnim.name = PHASE_NAMES[phaseIdx];
      ring.t = 0;
      if (phaseIdx === 1) { peonyCd = 3.0; peonyChance = null; }
      if (phaseIdx !== 1)   peonyChance = null;
      playPhaseSound(phaseIdx);
      // Phase-change fireworks — more intense at later phases
      var _phHues = [45, 24, 12, 200][phaseIdx] || 45;
      var _phCnt  = phaseIdx + 1;
      for (var _pf = 0; _pf < _phCnt; _pf++) {
        launchBgFW(gc.width * (0.2 + Math.random()*0.6), _phHues+Math.random()*30,
                   0.7 + phaseIdx * 0.25);
      }
    }
    prevPhase = phaseIdx;

    // Detect last man standing in multiplayer
    if (mpActive && !_lastManStanding && cpuUnits.length > 0) {
      var _allOut = true;
      for (var _li = 0; _li < cpuUnits.length; _li++) {
        if (!cpuUnits[_li].eliminated) { _allOut = false; break; }
      }
      if (_allOut) {
        _lastManStanding = true;
        _lastManTimer    = 0;
        // Announce with fireworks and message
        for (var _lf = 0; _lf < 3; _lf++) {
          launchBgFW(Math.random() * gc.width, 45 + _lf * 80, 1.3);
        }
      }
    }
    if (_lastManStanding) {
      _lastManTimer  += dt;
      _lastManMult    = Math.min(5.0, 1 + _lastManTimer * 0.18); // drain escalates
      _lastManShrink  = Math.max(0.08, 1 - _lastManTimer / 18);  // shrinks over 18s
      // Outflow sparks intensify as shrink progresses
      if (frameN % Math.max(4, Math.round(20 * _lastManShrink)) === 0) {
        spawnOutflowSparks(_wx || humanDrawX(), _wy || (_burnY || gc.height * 0.5),
                           2 + Math.round(4 * (1 - _lastManShrink)));
      }
    } else {
      _lastManMult   = 1.0;
      _lastManShrink = 1.0;
    }

    // Escalating difficulty: drain and ring speed ramp up over time
    timePressure  = 1 + Math.max(0, elapsed - 20) * 0.022;
    var drainMult = [1.0, 1.3, 1.8, 2.6][phaseIdx];
    var gustProb  = 0.025 + Math.max(0, elapsed - 25) * 0.0030;
    var gustAmt   = 10 + Math.round(Math.max(0, elapsed - 25) * 0.35);
    var gust      = (Math.random() < gustProb) ? gustAmt : 0;
    stability    -= (DRAIN_BASE * drainMult * timePressure * _lastManMult + gust) * dt;
    if (stability < 0) stability = 0;

    _burnY = getBurnY(elapsed, _burnYOffset);

    if (stability <= 0) {
      var _cx = humanDrawX(), _cy = _burnY;
      startFall(
        _cx + Math.sin(emberWobble*1.3)*3,
        _cy + Math.cos(emberWobble)*3,
        elapsed
      );
      return;
    }

    emberWobble += 0.03 + (1 - stability / STABILITY_MAX) * 0.07;
    if (phaseAnim.t > 0)   phaseAnim.t   = Math.max(0, phaseAnim.t - dt);
    if (ring.hitFlash > 0) ring.hitFlash  = Math.max(0, ring.hitFlash - dt);
    if (ring.gradeT   > 0) ring.gradeT    = Math.max(0, ring.gradeT  - dt);
    var ringSpd = 1 + Math.max(0, elapsed - 15) * 0.007; // ring accelerates from 15s
    ring.t += Math.PI * 2 * RING_CPS[phaseIdx] * ringSpd * dt;
    ring.r  = RING_MIN + (RING_MAX - RING_MIN) * (0.5 + 0.5 * Math.cos(ring.t));

    // Tutorial: first 3.5s ring fixed at PERF zone to teach timing
    if (elapsed < 3.5) {
      ring.r = RING_PERF;
    } else if (elapsed < 5.5) {
      var _tl = (elapsed - 3.5) / 2.0;
      ring.r = RING_PERF * (1 - _tl) + ring.r * _tl;
    }

    // Random ring phase jump — skip during tutorial period
    if (elapsed >= 5.5) {
      _ringPerturbTmr -= dt;
      if (_ringPerturbTmr <= 0) {
        ring.t += (Math.random() - 0.5) * Math.PI * 1.4; // random phase offset
        var nextBase = Math.max(3.5, 7 - (timePressure - 1) * 9); // faster as pressure builds
        _ringPerturbTmr = nextBase * (0.7 + Math.random() * 0.6);
      }
    }

    // Charge mechanic: restore multiplier builds the longer you wait between taps
    var _sinceLastMs = performance.now() - lastTap;
    _chargeTime = Math.max(0, (_sinceLastMs - TAP_COOLDOWN) / 1000);
    _chargeMult = 1.0 + Math.min(1.0, _chargeTime / 2.5);

    // Restore popup decay
    for (var _rpi = _restorePopups.length - 1; _rpi >= 0; _rpi--) {
      _restorePopups[_rpi].t -= dt;
      if (_restorePopups[_rpi].t <= 0) _restorePopups.splice(_rpi, 1);
    }

    if (phaseIdx === 1) {
      peonyCd -= dt;
      if (peonyChance === null && peonyCd <= 0) {
        peonyChance = { r:65, t:0, maxT:2.2 };
        peonyCd = 5 + Math.random()*3;
        playPeonyAlert();
      }
      if (peonyChance !== null) {
        peonyChance.t += dt;
        peonyChance.r  = 65 * (1 - peonyChance.t / peonyChance.maxT);
        if (peonyChance.r < RING_MIN - 5) peonyChance = null;
      }
    }
    if (extFlash.t  > 0) extFlash.t  = Math.max(0, extFlash.t  - dt);
    if (comboFlash.t > 0) comboFlash.t = Math.max(0, comboFlash.t - dt);

    if (_hissGain && _ac) {
      try {
        var _ht = [0.012, 0.038, 0.058, 0.018][phaseIdx] * (0.35 + stability / STABILITY_MAX * 0.65);
        _hissGain.gain.setTargetAtTime(_ht, _ac.currentTime, 0.5);
      } catch(e) {}
    }

    // Update CPU opponents — detect fresh eliminations for firework launch
    if (mpActive) {
      for (var icu = 0; icu < cpuUnits.length; icu++) {
        var _wasElim = cpuUnits[icu].eliminated;
        updateCpuUnit(cpuUnits[icu], dt, elapsed);
        if (!_wasElim && cpuUnits[icu].eliminated) {
          // Farewell firework at eliminated player's column
          launchBgFW(cpuDrawX(icu), cpuUnits[icu].hue, 1.6);
          launchBgFW(cpuDrawX(icu)+(Math.random()-0.5)*40, cpuUnits[icu].hue+25, 1.1);
        }
      }
    }

    // Auto-launch ambient fireworks — scale with difficulty
    _bgFwTimer -= dt;
    if (_bgFwTimer <= 0) {
      var _fw_n = Math.min(4, 1 + Math.floor((timePressure - 1) * 3.5));
      for (var _fi = 0; _fi < _fw_n; _fi++) {
        launchBgFW(Math.random() * gc.width, Math.random() * 360,
                   Math.max(0.45, 0.55 + (timePressure - 1) * 0.9));
      }
      _bgFwTimer = Math.max(1.8, (9 - timePressure * 3.8)) * (0.6 + Math.random() * 0.7);
    }

    // Recalc animated column positions on elimination, then lerp all
    if (_pendingRecalc && mpActive) {
      _pendingRecalc = false;
      recalcDrawXTgts(gc.width, true);
      // Clear stale smoke/particles so they don't float at old column positions
      smokes = []; particles = [];
    }
    lerpDrawXs(dt);
    if (_elimFlash > 0) _elimFlash = Math.max(0, _elimFlash - dt * 2.2);
    if (_syncFlash && _syncFlash.t > 0) _syncFlash.t -= dt;

    // Pre-compute wobbled ember position BEFORE spawning effects.
    // This ensures sparks/smoke originate exactly at the rendered ember, not at a stale offset.
    var _instabNow = 1 - stability / STABILITY_MAX;
    _wx = humanDrawX() + Math.sin(emberWobble * 1.3) * 3 * _instabNow;
    _wy = (_burnY || gc.height * 0.50) + Math.cos(emberWobble) * 3 * _instabNow;
    try {
      spawnSmoke(_wx, _wy);
      updateSmokes(dt);
      spawnSparks(elapsed);
      updateParticles(dt);
      updateBgFWs(dt);
      renderGame(elapsed);
    } catch (e) { /* keep loop alive on render error */ }

    if (_tapBlockedFlash > 0) _tapBlockedFlash = Math.max(0, _tapBlockedFlash - dt * 7);

    var pct = stability / STABILITY_MAX * 100;
    var bar = document.getElementById("meterBar");
    bar.style.width = pct + "%";
    var r = pct < 30 ? 220 : pct < 60 ? 210 : 120;
    var g = pct < 30 ?  55 : pct < 60 ? 150 : 210;
    bar.style.background = "rgb("+r+","+g+",50)";
    bar.style.boxShadow  = _tapBlockedFlash > 0
      ? "0 0 10px rgba(255,180,40," + (_tapBlockedFlash * 0.8).toFixed(2) + ")" : "";
    document.getElementById("timerLabel").textContent = elapsed.toFixed(1) + "s";
    document.getElementById("phaseLabel").textContent = PHASE_NAMES[phaseIdx];

    animId = requestAnimationFrame(gameLoop);
  }

  // ── TAP ────────────────────────────────────────
  function onTap() {
    if (gameState !== "burning") return;
    var now = performance.now();
    var sinceLast = now - lastTap;
    if (sinceLast < TAP_COOLDOWN) { _tapBlockedFlash = 1.0; return; }

    // Reset spam counter after a natural pause
    if (sinceLast > 1600) tapConsecutive = 0;

    lastTap = now;
    tapCount++;
    var prevCombo = combo;

    if (phaseIdx === 1 && peonyChance !== null &&
        peonyChance.r <= RING_GOOD + 5 && peonyChance.r >= RING_MIN - 5) {
      spawnPeonyBoom(_wx, _wy);
      ring.hitGrade = '大輪';
      ring.gradeT   = 1.8;
      ring.hitFlash = 0.55;
      stability = Math.min(STABILITY_MAX, stability + 42);
      if (stability > maxStab) maxStab = stability;
      peonyChance = null;
      peonyCd = 5 + Math.random()*3;
      playTapSound('dairin');
      tapConsecutive = 0;
      combo++;
      comboMax = Math.max(comboMax, combo);
      return;
    }

    var restore;
    // Streak penalty: every consecutive ring hit narrows the PERF window and reduces restore.
    // Forces players to break rhythm — same timing forever is punished.
    var _spen        = Math.max(0, _ringHitStreak - 3);
    var effPerf      = Math.max(RING_MIN + 5, RING_PERF - _spen * 1.4); // PERF window shrinks
    var restoreMult  = Math.max(0.40, 1 - _spen * 0.10);               // restore shrinks

    if (ring.r <= effPerf) {
      _ringHitStreak++;
      restore = Math.round(30 * restoreMult);
      tapConsecutive = 0;
      ring.hitGrade = _ringHitStreak > 6 ? '絶妙…' : '絶妙';
      ring.gradeT   = 1.05;
      ring.hitFlash = 0.38 * restoreMult;
      spawnInflowSparks(_wx, _wy, ring.r, restoreMult);
      spawnPerfectBurst(_wx, _wy);
      playTapSound('perf');
      combo++;
      if (phaseIdx === 1 || phaseIdx === 2) {
        var rem = MAX_PHASE_EXT - phaseExtSum[phaseIdx];
        if (rem > 0) {
          var actual = Math.min(1.5, rem);
          phaseExtSum[phaseIdx] += actual;
          for (var k = phaseIdx; k < phaseEnds.length; k++) phaseEnds[k] += actual;
          extFlash.t = 1.2; extFlash.text = '+' + actual.toFixed(1) + '秒';
        }
      }
    } else if (ring.r <= RING_GOOD) {
      _ringHitStreak++;
      restore = Math.round(20 * restoreMult);
      tapConsecutive = 0;
      ring.hitGrade = '良';
      ring.gradeT   = 0.65;
      ring.hitFlash = 0.22 * restoreMult;
      spawnInflowSparks(_wx, _wy, ring.r, restoreMult * 0.7);
      playTapSound('good');
      combo++;
    } else {
      // Outside ring: reset streak + diminishing returns on miss
      _ringHitStreak = 0;
      tapConsecutive++;
      restore = Math.max(1, Math.round(TAP_RESTORE / Math.min(tapConsecutive, 5)));
      ring.hitGrade = '';
      spawnOutflowSparks(_wx, _wy, 3 + Math.min(tapConsecutive, 5));
      playTapSound('norm');
      combo = 0;
    }
    // Charge multiplier: longer wait = more restore
    var _charged = (_chargeMult > 1.05);
    if (_charged) restore = Math.round(restore * _chargeMult);

    stability = Math.min(STABILITY_MAX, stability + restore);
    if (stability > maxStab) maxStab = stability;
    comboMax = Math.max(comboMax, combo);

    // Floating +restore popup
    var _rpCol = _charged ? '#ffe840' :
                 (ring.r <= RING_PERF ? '#ffd050' : (ring.r <= RING_GOOD ? '#aaffcc' : '#909090'));
    _restorePopups.push({
      val: '+' + restore, color: _rpCol,
      x: _wx || humanDrawX(),
      y: (_wy || _burnY || gc.height * 0.5) - 24,
      t: 0.75
    });

    // 同調チェック: リングヒット時にCPUの直近タップと重なれば「息が合った！」
    if (combo > prevCombo && mpActive) {
      var elNow = (performance.now() - startTime) / 1000;
      for (var si = 0; si < cpuUnits.length; si++) {
        var su = cpuUnits[si];
        if (!su.eliminated && Math.abs(elNow - su.lastTapTime) < 0.55) {
          stability = Math.min(STABILITY_MAX, stability + 8); // 小さなボーナス
          var _scx1 = humanDrawX(), _scy1 = _burnY || gc.height * 0.5;
          var _scx2 = cpuDrawX(si), _scy2 = getBurnY(elNow, su.burnYOffset);
          _syncFlash = { t: 1.6, cx1: _scx1, cy1: _scy1, cx2: _scx2, cy2: _scy2 };
          spawnSyncTrail(_scx1, _scy1, _scx2, _scy2, 45, su.hue);
          // 息が合った花火 — 両者のカラーで2発
          launchBgFW(humanDrawX(), 45, 1.1);
          launchBgFW(cpuDrawX(si), su.hue, 1.1);
          break;
        }
      }
    }

    if (prevCombo < 5 && combo >= 5) {
      if (phaseIdx === 1) spawnPeonPop(_wx, _wy, 1.0);
      else if (phaseIdx === 2) spawnNeedleBurst(_wx, _wy, 1.0);
      launchBgFW(humanDrawX(), 45, 0.9); // combo 5達成で打ち上げ
    }
    if (prevCombo < 10 && combo >= 10) {
      comboFlash.t = 0.6;
      launchBgFW(humanDrawX(), 52, 1.3);
      launchBgFW(humanDrawX() - gc.width*0.06, 38, 0.9);
      launchBgFW(humanDrawX() + gc.width*0.06, 58, 0.9);
    }
  }

  // ── SPARKS ─────────────────────────────────────
  function spawnSparks(elapsed) {
    var c  = PHASE_CFG[phaseIdx];
    // Use wobbled ember position set this frame — sparks originate at the exact ember center
    var cx = (_wx !== 0 ? _wx : humanDrawX());
    var cy = (_wy !== 0 ? _wy : (_burnY || gc.height * 0.50));
    var stFactor = 0.35 + (stability / STABILITY_MAX) * 0.65;

    if (frameN % c.ivl === 0) {
      var count = Math.round(c.burst * stFactor * PM);
      for (var i = 0; i < count; i++) {
        var angle;
        if (c.mode === 'upper') {
          angle = Math.PI + Math.random() * Math.PI;
        } else if (c.mode === 'lower') {
          angle = Math.random() * Math.PI;
        } else {
          angle = Math.random() * Math.PI * 2;
        }
        var spd  = (0.3 + Math.random() * 1.7) * c.spd * stFactor;
        var hue  = c.h0 + Math.random() * (c.h1 - c.h0);
        var life = c.life * (0.5 + Math.random() * 0.8);
        particles.push({
          x:cx, y:cy,
          vx:Math.cos(angle)*spd, vy:Math.sin(angle)*spd,
          life:life, maxLife:life,
          sz:c.sz*(0.5+Math.random()*0.8),
          hue:hue, grav:c.grav, trail:[],
          trailMax: c.trailMax,
          canBranch: c.branch && Math.random()<0.45,
          branched: false
        });
      }
    }

    if (phaseIdx === 1 && frameN % 120 === 0) spawnPeonPop(cx, cy, stFactor);
    if (phaseIdx === 2 && frameN % 90  === 0) spawnNeedleBurst(cx, cy, stFactor);
    if (phaseIdx === 3 && frameN % 80  === 0) spawnKikuBurst(cx, cy, stFactor);
  }

  function spawnPeonPop(cx, cy, stf) {
    for (var i = 0; i < 14; i++) {
      var a = Math.random() * Math.PI * 2;
      var s = (2.2 + Math.random() * 2.8) * Math.max(0.6, stf);
      particles.push({
        x:cx, y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
        life:0.85+Math.random()*0.30, maxLife:1.15,
        sz:2.8+Math.random()*0.9, hue:24+Math.random()*38,
        grav:0.012, trail:[], trailMax:7, canBranch:true, branched:false
      });
    }
  }

  function spawnNeedleBurst(cx, cy, stf) {
    var n = 44;
    for (var i = 0; i < n; i++) {
      var a  = (i / n) * Math.PI * 2 + Math.random() * 0.08;
      var s  = (3.0 + Math.random() * 2.2) * Math.max(0.5, stf);
      particles.push({
        x:cx, y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
        life:1.3+Math.random()*0.4, maxLife:1.7,
        sz:1.8+Math.random()*0.7, hue:10+Math.random()*38,
        grav:0.002, trail:[], trailMax:26, canBranch:false, branched:false
      });
    }
  }

  function spawnKikuBurst(cx, cy, stf) {
    var sf = Math.max(0.5, stf);
    for (var i = 0; i < 20; i++) {
      var a1 = Math.random() < 0.75 ? Math.random()*Math.PI : Math.random()*Math.PI*2;
      var s1 = (1.8 + Math.random() * 2.2) * sf;
      particles.push({
        x:cx, y:cy, vx:Math.cos(a1)*s1, vy:Math.sin(a1)*s1,
        life:0.62+Math.random()*0.32, maxLife:0.94,
        sz:1.9+Math.random()*0.6, hue:10+Math.random()*30,
        grav:0.040, trail:[], trailMax:8, canBranch:false, branched:false
      });
    }
    for (var j = 0; j < 12; j++) {
      var a2 = Math.random() * Math.PI;
      var s2 = (1.0 + Math.random() * 1.2) * sf;
      particles.push({
        x:cx, y:cy, vx:Math.cos(a2)*s2, vy:Math.sin(a2)*s2,
        life:0.35+Math.random()*0.22, maxLife:0.57,
        sz:1.0+Math.random()*0.4, hue:14+Math.random()*18,
        grav:0.048, trail:[], trailMax:4, canBranch:false, branched:false
      });
    }
  }

  // CPU用花火スポーン — hue指定でparticlesに流す（トレイル・重力・分岐が自動でつく）
  function spawnCpuPeonPop(cx, cy, stf, hue) {
    for (var i = 0; i < 10; i++) {
      var a = Math.random() * Math.PI * 2;
      var s = (1.8 + Math.random() * 2.2) * Math.max(0.6, stf);
      particles.push({ x:cx, y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
        life:0.75+Math.random()*0.28, maxLife:1.03,

        grav:0.012, trail:[], trailMax:6, canBranch:true, branched:false });
    }
  }
  function spawnCpuNeedleBurst(cx, cy, stf, hue) {
    var n = 30;
    for (var i = 0; i < n; i++) {
      var a = (i / n) * Math.PI * 2 + Math.random() * 0.1;
      var s = (2.4 + Math.random() * 1.8) * Math.max(0.5, stf);
      particles.push({ x:cx, y:cy, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
        life:1.1+Math.random()*0.35, maxLife:1.45,
